name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Code style (fast, fails early) ─────────────────────────────────────────
  style:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - run: vendor/bin/pint --test

  # ── Security audit ──────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, json
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Composer audit (known CVEs)
        run: composer audit --no-interaction

      - name: NPM audit (high severity)
        run: npm audit --audit-level=high || true

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests (PHP 8.4 / SQLite)
    runs-on: ubuntu-latest
    needs: [style]

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml, ctype, json, bcmath
          coverage: none

      - name: Copy environment file
        run: cp .env.example .env

      - name: Create SQLite database
        run: touch database/database.sqlite

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - run: php artisan key:generate
      - run: cp storage/data/settingsData.json.example storage/data/settingsData.json
      - run: php artisan migrate --force

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-

      - run: npm ci
      - run: npm run build
      - run: php artisan test --compact
